; PlatformIO project for ESP32-S3 USB Bridge
; Bridges Mac (UART/CP2102N) <-> U2702A oscilloscope (USB Host OTG)

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 2000000

; USB OTG on native USB port (GPIO19/GPIO20)
board_upload.use_1200bps_touch = no

build_flags =
    -DCONFIG_USB_OTG_SUPPORTED=1
    -I$PROJECT_PACKAGES_DIR/framework-espidf/components/usb/private_include
